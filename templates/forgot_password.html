{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="form-card">
        <div class="auth-header">
            <div class="m-stripe m-stripe-accent" style="margin:0 auto var(--sp-lg);"><span></span><span></span><span></span></div>
            <h1 class="display-md">FORGOT PASSWORD</h1>
            <p class="body-md mt-sm">Enter your email address to receive an OTP to reset your password.</p>
        </div>

        <form method="POST" action="{{ url_for('forgot_password') }}">
            {{ form.hidden_tag() }}

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" name="email" id="email" class="form-input" value="{{ form.email.data or '' }}" placeholder="you@example.com" required>
                {% for error in form.email.errors %}
                <p class="form-error">{{ error }}</p>
                {% endfor %}
            </div>

            <button type="submit" class="btn btn-filled w-full">SEND OTP →</button>
        </form>
        <div class="auth-footer" style="margin-top: 1rem; text-align: center;">
            <p class="body-sm"><a href="{{ url_for('login') }}">Back to Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
