databases:
  - name: flask-db
    plan: free
    region: oregon

services:
  - type: web
    name: flask-app
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flask-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
